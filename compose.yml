services:
  nginx:
    container_name: ${STORE_PREFIX}_nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./html:/var/www/html
      - ./docker/nginx.default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      db:
        condition: service_healthy
      php:
        condition: service_started
      opensearch:
        condition: service_started

  php:
    container_name: ${STORE_PREFIX}_php
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION}
        PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT}
        XDEBUG_VERSION: ${XDEBUG_VERSION}
    volumes:
      - ./html:/var/www/html
      - ${COMPOSER_CACHE_PATH}:/var/www/.composer
      - ./.history:/var/www/.history
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - STORE_PREFIX=${STORE_PREFIX}
      - PHP_IDE_CONFIG=serverName=${STORE_PREFIX}.localhost
      - HISTFILE=/var/www/.history/.bash_history

  db:
    image: mysql:debian
    container_name: ${STORE_PREFIX}_db
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
      - ./volumes/dumps:/dumps
    command: --max_allowed_packet=32505856
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: ${STORE_PREFIX}_opensearch
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/var/lib/opensearch/data
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  mailpit:
    image: axllent/mailpit
    container_name: ${STORE_PREFIX}_mailpit
    volumes:
      - mailpit_data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  db_data:
    name: ${STORE_PREFIX}_db_data
  opensearch_data:
    name: ${STORE_PREFIX}_opensearch_data
  mailpit_data:
    name: ${STORE_PREFIX}_mailpit_data

networks:
  default:
    name: ${STORE_PREFIX}-network
    driver: bridge
